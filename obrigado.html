<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Mensagem enviada | Stephanie Campos
</title>

<link rel="stylesheet"
href="css/global.css">

<style>

body{

    margin:0;

    min-height:100vh;

    display:flex;

    align-items:center;

    justify-content:center;

    background:
    linear-gradient(
    rgba(15,23,42,0.92),
    rgba(15,23,42,0.92)),
    url('https://images.unsplash.com/photo-1560518883-ce09059eeffa?q=80&w=1973&auto=format&fit=crop');

    background-size:cover;
    background-position:center;

    font-family:sans-serif;

    color:white;

    padding:20px;
}

.obrigado-box{

    max-width:700px;

    background:rgba(255,255,255,0.08);

    border:1px solid rgba(255,255,255,0.10);

    backdrop-filter:blur(10px);

    padding:60px;

    border-radius:32px;

    text-align:center;
}

.obrigado-box i{

    font-size:70px;

    color:#22c55e;

    margin-bottom:30px;
}

.obrigado-box h1{

    font-size:52px;

    margin-bottom:24px;

    line-height:1.2;
}

.obrigado-box p{

    font-size:20px;

    line-height:1.8;

    color:rgba(255,255,255,0.82);

    margin-bottom:40px;
}

.obrigado-btn{

    display:inline-flex;

    align-items:center;
    justify-content:center;

    padding:18px 34px;

    border-radius:16px;

    background:white;

    color:#0f172a;

    font-weight:700;

    text-decoration:none;
}

@media(max-width:768px){

    .obrigado-box{

        padding:40px 28px;
    }

    .obrigado-box h1{

        font-size:38px;
    }

    .obrigado-box p{

        font-size:18px;
    }
}

</style>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="obrigado-box">

    <i class="fa-solid fa-circle-check"></i>

    <h1>

        Mensagem enviada com sucesso!

    </h1>

    <p>

        Recebemos seu contato e retornaremos
        o mais rápido possível para ajudar você
        da melhor forma.

    </p>

    <a href="index.html"
    class="obrigado-btn">

        Voltar para o início

    </a>

</div>

</body>

</html>
